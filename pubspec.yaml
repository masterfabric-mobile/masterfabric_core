name: masterfabric_core
description: "Core utilities, base classes, and shared logic for the MasterFabric Flutter project."
version: 2.0.0
homepage: https://github.com/gurkanfikretgunak/masterfabric_core
repository: https://github.com/gurkanfikretgunak/masterfabric_core

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^11.0.0
  equatable: ^2.1.0
  
  # Navigation
  go_router: ^17.3.0
  
  # Dependency Injection
  injectable: ^3.0.0
  get_it: ^9.2.1
  
  # Localization
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  
  # Utilities
  logger: ^2.7.0
  dio: ^5.10.0
  shared_preferences: ^2.5.5
  hive_ce: ^2.19.3
  url_launcher: ^6.3.1
  intl: ^0.20.0
  uuid: ^4.6.0
  crypto: ^3.0.6
  
  # Security
  flutter_secure_storage: ^10.3.1
  
  # System
  device_info_plus: ^13.2.0
  package_info_plus: ^10.2.1
  permission_handler: ^12.0.3
  path_provider: ^2.1.6
  
  # Network
  network_info_plus: ^8.2.1
  connectivity_plus: ^7.3.0
  
  # UI
  flutter_svg: ^2.3.0
  flutter_html: ^3.0.0
  flutter_inappwebview: ^6.1.5
  webview_flutter: ^4.14.1
  
  # Notifications
  flutter_local_notifications: ^22.1.0
  timezone: ^0.11.1
  
  # Push Notifications
  onesignal_flutter: ^5.6.5
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  
  # Sharing
  share_plus: ^13.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  injectable_generator: ^3.1.0
  slang_build_runner: ^4.8.0

dependency_overrides:
  build: ^4.0.0
  intl: ^0.20.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      ios:
        pluginClass: MasterfabricCorePlugin

  assets:
    - assets/app_config.json
    - assets/i18n/
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
