name: masterfabric_core_example
description: Example app demonstrating masterfabric_core package usage
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  
  # MasterFabric Core Package
  masterfabric_core:
    path: ../

  equatable: ^2.1.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  go_router: ^17.3.0
  permission_handler: ^12.0.3
  package_info_plus: ^10.2.1
  
  # Icons
  lucide_icons_flutter: ^3.1.9
  
  
  # Localization
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^3.1.0
  build_runner: ^2.15.1
  slang_build_runner: ^4.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/app_config.json
    - assets/app_icon_1024x1024.png
    - assets/svg/
    - assets/i18n/
