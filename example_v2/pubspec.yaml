name: example_v2
description: AURA — local fitness tracker coach built only on masterfabric_core.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  masterfabric_core:
    path: ../
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_config.json
    - assets/icons/
    - assets/illustrations/
    - assets/illustrations/brand/
    - assets/illustrations/tips/
    - assets/illustrations/onboarding/
    - assets/illustrations/permissions/
    - assets/illustrations/log/
    - assets/notifications/
    - assets/webllm/
